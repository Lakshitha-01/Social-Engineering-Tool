<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Phishing Simulator - Send Email</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
    body {
      margin: 0;
      background-color: #f4f6fb;
      font-family: 'Inter', sans-serif;
      color: #222;
    }

    .header {
      text-align: center;
      padding-top: 50px;
    }

    .header h1 {
      font-weight: 700;
      font-size: 28px;
      color: #121826;
      margin-bottom: 6px;
    }

    .header p.subtitle {
      color: #667085;
      font-size: 16px;
      margin-top: 0;
      margin-bottom: 40px;
    }

    .container {
      max-width: 700px;
      margin: 50px auto;
      background: white;
      border-radius: 12px;
      padding: 30px 40px;
      box-shadow: 0 4px 12px rgb(0 0 0 / 0.1);
    }
    h1 {
      font-weight: 700;
      font-size: 28px;
      margin-bottom: 6px;
      color: #121826;
      text-align: center;
    }
    h2 {
      text-align: center;
    }
    p.subtitle {
      color: #667085;
      text-align: center;
      margin-top: 0;
      margin-bottom: 30px;
      font-weight: 400;
      font-size: 16px;
    }
    label {
      font-weight: 600;
      font-size: 14px;
      display: block;
      margin-bottom: 8px;
      color: #344054;
    }
    input[type="email"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d0d5dd;
      border-radius: 8px;
      font-size: 15px;
      color: #101828;
      box-sizing: border-box;
      margin-bottom: 24px;
      font-family: inherit;
    }
    button {
      width: 100%;
      background-color: #4f46e5;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-weight: 600;
      font-size: 17px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }
    button:hover {
      background-color: #4338ca;
    }
    .summary {
      margin-bottom: 24px;
      background: #f0f4ff;
      border-radius: 8px;
      padding: 16px;
      font-size: 14px;
      color: #334155;
    }
  </style>
</head>
<body>

  <!-- Header OUTSIDE the box -->
  <div class="header">
    <h1>Ethical Phishing Simulator</h1>
    <p class="subtitle"></p>
  </div>

  <div class="container">
    <h2>3. Send Phishing Email</h2>
    <p class="subtitle">Review your choices and enter recipient email</p>

    <div class="summary">
      <p><strong>Email Template:</strong> {{ templateName }}</p>
      <p><strong>Sender Name:</strong> {{ senderName }}</p>
      <p><strong>Subject:</strong> {{ subject }}</p>
      <p><strong>Email Body:</strong><br /> {{ emailBody | nl2br }}</p>
      <p><strong>Link Text:</strong> {{ linkText }}</p>
      <p><strong>Landing Page:</strong> {{ landingPage | capitalize }}</p>
    </div>

    <form action="/send" method="POST">
      <!-- Hidden fields to keep all previous data -->
      <input type="hidden" name="template" value="{{ template }}">
      <input type="hidden" name="senderName" value="{{ senderName }}">
      <input type="hidden" name="subject" value="{{ subject }}">
      <input type="hidden" name="emailBody" value="{{ emailBody }}">
      <input type="hidden" name="linkText" value="{{ linkText }}">
      <input type="hidden" name="landingPage" value="{{ landingPage }}">

      <label for="recipient">Recipient Email:</label>
      <input type="email" id="recipient" name="recipient" placeholder="user@example.com" required />

      <button type="submit">Send Phishing Email</button>
    </form>
  </div>
</body>
</html>
