<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gift Card Successfully Redeemed</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f3f3f3;
      margin: 0;
      padding: 0;
      color: #111;
      text-align: center;
    }
    .container {
      max-width: 500px;
      background-color: #fff;
      margin: 80px auto;
      padding: 40px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .logo {
      margin-bottom: 25px;
    }
    .logo img {
      height: 40px;
    }
    h2 {
      color: #008000;
      margin-bottom: 10px;
    }
    .amount {
      font-size: 28px;
      color: #ff9900;
      margin-bottom: 15px;
    }
    p {
      font-size: 16px;
      color: #333;
      margin-bottom: 30px;
    }
    .btn {
      background-color: #ff9900;
      color: #111;
      padding: 12px 25px;
      font-size: 16px;
      text-decoration: none;
      border-radius: 5px;
      font-weight: bold;
      display: inline-block;
    }
    .btn:hover {
      background-color: #e88e00;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <img src="https://upload.wikimedia.org/wikipedia/commons/a/a9/Amazon_logo.svg" alt="Amazon Logo" />
    </div>

    <h2>Gift Card Redeemed</h2>
    <div class="amount">$50.00 has been added to your balance</div>
    <p>Your Amazon account balance has been successfully updated.</p>
    
  </div>
</body>
</html>
