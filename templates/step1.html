<!DOCTYPE html>

  <form action="/step1" method="POST">

      </div>

      <button type="submit">Next: Landing Page Setup →</button>
    </div>

  <script>

    const templateSelect = document.getElementById('templateSelect');
    const senderName = document.getElementById('senderName');
    const subject = document.getElementById('subject');
    const emailBody = document.getElementById('emailBody');
    const linkText = document.getElementById('linkText');

    const templates = {
      "password-reset": {
        senderName: "IT Support",
        subject: "Action Required: Password Reset",
        emailBody: `Dear user,

Your account password has expired due to a recent security policy update. To continue using your account, you are required to reset your password.

Please click the link below to create a new password

        linkText: "Reset Password"
      },

      "account-verification": {

    templateSelect.addEventListener('change', () => {

      senderName.value = templates[selected].senderName;
      subject.value = templates[selected].subject;
      emailBody.value = templates[selected].emailBody;
      linkText.value = templates[selected].linkText;
    });

</body>
